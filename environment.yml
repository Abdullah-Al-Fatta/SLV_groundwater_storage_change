name: slv-groundwater
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.9
  
  # Core scientific computing
  - numpy>=1.21.0
  - pandas>=1.3.0
  - scipy>=1.7.0
  
  # Geospatial packages
  - geopandas>=0.10.0
  - rasterio>=1.2.0
  - fiona>=1.8.20
  - shapely>=1.8.0
  - pyproj>=3.2.0
  - gdal>=3.3.0
  
  # Visualization
  - matplotlib>=3.4.0
  - seaborn>=0.11.0
  
  # Statistical analysis
  - statsmodels>=0.13.0
  - scikit-learn>=1.0.0
  
  # Data handling
  - openpyxl>=3.0.9
  
  # Jupyter
  - jupyter>=1.0.0
  - ipython>=7.30.0
  
  # Testing
  - pytest>=6.2.0
  - pytest-cov>=3.0.0
  
  # Pip packages (not available in conda)
  - pip
  - pip:
    - earthengine-api>=0.1.300
    - geemap>=0.13.0
    - adjustText>=0.7.3
